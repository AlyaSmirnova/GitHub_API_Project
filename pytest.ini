[pytest]
addopts = -v -s --alluredir=allure-results --tb=short

testpaths = tests

markers =
    issue: тесты для Issue API (test_create_issue.py, etc.)
    repo: тесты для Repository API (test_create_repo.py, etc.)
    user: тесты профиля пользователя (test_profile_access.py)
    smoke: быстрые проверки критического функционала

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
